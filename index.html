<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greek Match Trainer</title>
  <link rel="stylesheet" href="styles.css" />
  <script defer src="app.js"></script>
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="tag">Тренажёр слов</p>
      <div class="dictionary-picker">
        <label for="dictionary-select">Выбери базу слов</label>
        <select id="dictionary-select" aria-label="Выбор словаря"></select>
        <span id="word-count" aria-live="polite">0 слов</span>
      </div>
      <div class="hero__content">
        <h1>Соедини греческое слово с переводом</h1>
        <p class="subtitle">Запусти раунд из случайных слов и найди все пары. <span id="selected-base-summary" aria-live="polite">Выбрана база: 0 слов</span></p>
      </div>
      <div class="hero__actions">
        <button id="new-round" class="primary">Новый раунд</button>
      </div>
    </header>

    <section class="progress-panel">
      <div class="progress-bar" aria-hidden="true">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <p id="status-text" class="status-text">Загружаю слова…</p>
    </section>

    <section class="board" id="board" aria-live="polite" aria-label="Поле с карточками"></section>

    <p id="message" class="message" aria-live="assertive"></p>

    <section class="word-list-section" aria-labelledby="word-list-title">
      <div class="word-list-section__header">
        <h2 id="word-list-title">Слова выбранного словаря</h2>
        <p id="word-list-summary" aria-live="polite">Список появится после загрузки базы.</p>
      </div>
      <div class="word-list-table-wrap" id="word-list-wrap">
        <table class="word-list-table">
          <thead>
            <tr>
              <th scope="col">Слово</th>
              <th scope="col">Перевод</th>
            </tr>
          </thead>
          <tbody id="word-list-body"></tbody>
        </table>
      </div>
      <button id="word-list-toggle" class="secondary word-list-toggle" type="button" hidden>Показать все слова</button>
    </section>

    <footer class="app-footer">
      <p id="platform-meta" aria-live="polite"></p>
    </footer>
  </main>
</body>
</html>
